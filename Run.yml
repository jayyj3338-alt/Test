name: Run Bot WA To
on:
  repository_dispatch:
    types: [run-bot-event]

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install Dependencies
        run: npm install

      - name: Start WhatsApp Bot
        run: npm start
